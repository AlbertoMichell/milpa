<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Sistema MILPA</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root { --forest-green: #2E7D32; --forest-dark: #1B5E20; }
    .register-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8f9fa; }
    .register-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .btn-register { background: var(--forest-green); color: white; }
    .btn-register:hover { background: var(--forest-dark); }
  </style>
</head>
<body>
  <section class="register-section">
    <div class="card register-card p-4" style="width: 100%; max-width: 400px;">
      <h3 class="text-center mb-4">Crear Cuenta MILPA</h3>
      <div id="alertContainer"></div>
      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label for="regUsername" class="form-label">Usuario</label>
          <input type="text" id="regUsername" class="form-control" placeholder="Nombre de usuario" required minlength="3">
          <div class="invalid-feedback">Ingresa un usuario válido (mínimo 3 caracteres).</div>
        </div>
        <div class="mb-3">
          <label for="regPassword" class="form-label">Contraseña</label>
          <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required minlength="6">
          <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
        </div>
        <div class="mb-4">
          <label for="regConfirm" class="form-label">Confirmar Contraseña</label>
          <input type="password" id="regConfirm" class="form-control" placeholder="••••••••" required minlength="6">
          <div class="invalid-feedback">Las contraseñas no coinciden.</div>
        </div>
        <button type="submit" id="registerBtn" class="btn btn-register w-100">Registrar</button>
      </form>
      <p class="text-center mt-3">¿Ya tienes cuenta? <a href="login.html" class="text-forest-green">Iniciar sesión</a></p>
    </div>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('registerForm');
      const btn = document.getElementById('registerBtn');
      const alertContainer = document.getElementById('alertContainer');

      form.addEventListener('submit', async e => {
        e.preventDefault();
        form.classList.remove('was-validated');
        alertContainer.innerHTML = '';

        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;

        if (password !== confirm) {
          document.getElementById('regConfirm').classList.add('is-invalid');
          return;
        }

        if (!form.checkValidity()) {
          form.classList.add('was-validated');
          return;
        }

        btn.disabled = true;
        try {
          const response = await fetch('http://localhost:4000/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Error al registrar');

          // Guardar usuario en localStorage como en login
          localStorage.setItem('milpaUser', JSON.stringify({ userId: data.userId, username: data.username }));
          window.location.href = 'dashboard.html';
        } catch (err) {
          alertContainer.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
        } finally {
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
