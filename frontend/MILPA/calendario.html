<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Sistema MILPA</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FullCalendar CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    <!-- CSS personalizado -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/milpa-layout.css">
    <style>
        /* ————————— MODIFICADO: añadidos estilos para el sidebar ————————— */
        .sidebar {
            background-color: #2E7D32; /* Verde MILPA */
            color: white;
            height: 100vh;
            position: fixed;
            width: 250px;
            transition: all 0.3s;
            z-index: 1000;
        }
        .sidebar-collapsed {
            width: 80px;
        }
        .sidebar-collapsed .sidebar-text,
        .sidebar-collapsed .sidebar-brand-text {
            display: none;
        }
        .sidebar-collapsed .sidebar-icon {
            margin-right: 0;
        }

        /* ————————— MODIFICADO: estilos para desplazar contenido al lado del sidebar ————————— */
        .main-content {
            margin-left: 250px;
            transition: all 0.3s;
        }
        .main-content-expanded {
            margin-left: 80px;
        }



        /* ———————– ESTILOS DE NAVEGACIÓN DEL SIDEBAR ———————– */
.sidebar-nav {
    padding: 0;
    list-style: none;
    margin-top: 1rem;        /* ya tenías mt-3, pero si lo quieres inline */
}
.sidebar-nav-item {
    margin-bottom: 5px;
    position: relative;
}
.sidebar-nav-link {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    color: rgba(255, 255, 255, 0.8);
    text-decoration: none;
    transition: all 0.3s;
    border-left: 3px solid transparent;
}
.sidebar-nav-link:hover,
.sidebar-nav-link.active {
    background-color: rgba(255, 255, 255, 0.1);
    color: #fff;
    border-left: 3px solid #fff;
}
.sidebar-icon {
    margin-right: 10px;
    font-size: 1.2rem;
}
/* texto de los enlaces, para esconderlo al colapsar */
.sidebar-text { white-space: nowrap; } 

/* Style para la marca del sidebar */
.sidebar-brand {
    padding: 1.5rem 1rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}
.sidebar-brand-text {
    margin-left: 0.5rem;
    font-size: 1.25rem;
    font-weight: bold;
}
/* Badge de alertas sobre el icono */
.alert-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    font-size: 0.7rem;
}






        /* ————————— RESTO DE ESTILOS ORIGINALES ————————— */
        .calendar-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .fc-toolbar-title {
            font-size: 1.25rem;
            font-weight: 600;
        }
        .fc-button {
            background-color: #2E7D32 !important;
            border-color: #2E7D32 !important;
        }
        .fc-button:hover, .fc-button:active {
            background-color: #1B5E20 !important;
            border-color: #1B5E20 !important;
        }
        .fc-button-primary:not(:disabled).fc-button-active {
            background-color: #1B5E20 !important;
        }
        .fc-event {
            border-radius: 4px;
            border: none;
            font-size: 0.85rem;
            padding: 2px 5px;
        }
        .event-sowing { background-color: #4CAF50; }
        .event-harvest { background-color: #FF9800; }
        .event-maintenance { background-color: #2196F3; }
        .event-pest { background-color: #F44336; }
        .event-other { background-color: #9C27B0; }
        .task-card {
            border-left: 4px solid;
            transition: all 0.3s;
        }
        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="milpa-page" data-active-page="calendario.html">
    <!-- ————————— AGREGADO: Sidebar panel con menú de navegación ————————— -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand d-flex align-items-center justify-content-center">
            <i class="fas fa-leaf sidebar-icon fa-lg"></i>
            <span class="sidebar-brand-text ms-2 fs-5 fw-bold">MILPA</span>
        </div>
        <ul class="sidebar-nav mt-3">
            <li class="sidebar-nav-item">
                <a href="dashboard.html" class="sidebar-nav-link">
                    <i class="fas fa-home sidebar-icon"></i>
                    <span class="sidebar-text">Inicio</span>
                </a>
            </li>
            <li class="sidebar-nav-item">
                <a href="recomendaciones.html" class="sidebar-nav-link">
                    <i class="fas fa-lightbulb sidebar-icon"></i>
                    <span class="sidebar-text">Recomendaciones</span>
                    <span class="badge bg-danger alert-badge" style="display:none">0</span>
                </a>
            </li>
            <li class="sidebar-nav-item">
                <a href="datos.html" class="sidebar-nav-link">
                    <i class="fas fa-chart-line sidebar-icon"></i>
                    <span class="sidebar-text">Datos</span>
                </a>
            </li>
            <li class="sidebar-nav-item">
                <a href="tiempo-real.html" class="sidebar-nav-link">
                    <i class="fas fa-clock sidebar-icon"></i>
                    <span class="sidebar-text">Monitoreo</span>
                </a>
            </li>
            <li class="sidebar-nav-item">
                <a href="calendario.html" class="sidebar-nav-link">
                    <i class="fas fa-calendar-alt sidebar-icon"></i>
                    <span class="sidebar-text">Calendario</span>
                </a>
            </li>
            <li class="sidebar-nav-item">
                <a href="base.html" class="sidebar-nav-link">
                    <i class="fas fa-book sidebar-icon"></i>
                    <span class="sidebar-text">Conocimiento</span>
                </a>
            </li>
            <li class="sidebar-nav-item mt-4">
                <a href="configuracion.html" class="sidebar-nav-link">
                    <i class="fas fa-cog sidebar-icon"></i>
                    <span class="sidebar-text">Configuración</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- ————————— AGREGADO: inicio del contenedor principal que empuja el contenido al lado del sidebar ————————— -->
    <div class="main-content" id="mainContent">
        <nav class="navbar navbar-expand-lg navbar-light border-bottom milpa-top-navbar" aria-label="Barra superior">
            <div class="container-fluid px-3">
                <button class="btn btn-link text-secondary px-1" type="button" id="sidebarToggle" aria-label="Alternar menú lateral">
                    <i class="fas fa-bars fs-5" aria-hidden="true"></i>
                </button>
                <div class="ms-auto d-flex align-items-center gap-2">
                    <a href="dashboard.html" class="btn btn-sm btn-outline-secondary d-none d-md-inline">Inicio</a>
                    <button type="button" class="btn btn-sm btn-outline-danger" id="milpaLogoutBtn">Salir</button>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4 py-4">
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="fw-bold">Calendario Agrícola</h2>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="dashboard.html">Inicio</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Calendario</li>
                        </ol>
                    </nav>
                </div>
            </div>

            <div class="row">
                <!-- Calendario FullCalendar -->
                <div class="col-lg-8 mb-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <div id="calendar" class="calendar-container"></div>
                        </div>
                    </div>
                </div>
                <!-- Lista de próximas actividades -->
                <div class="col-lg-4 mb-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="mb-0">Próximas actividades</h5>
                                <div class="d-flex gap-2">
                                  <button id="generatePlanBtn" class="btn btn-sm btn-outline-forest-green" type="button">
                                      <i class="fas fa-rotate me-1"></i> Sincronizar IA
                                  </button>
                                  <button class="btn btn-sm btn-forest-green" data-bs-toggle="modal" data-bs-target="#newEventModal">
                                      <i class="fas fa-plus me-1"></i> Nueva
                                  </button>
                                </div>
                            </div>
                            <div id="upcomingTasksList" class="task-list">
                                <div class="text-center text-muted py-4">Cargando actividades...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div> <!-- ————————— FIN main-content ————————— -->

    <!-- Modal para nuevo evento (sin cambios) -->
    <div class="modal fade" id="newEventModal" tabindex="-1" aria-labelledby="newEventModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="newEventModalLabel">Nueva actividad</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="eventForm">
                        <div class="mb-3">
                            <label for="eventTitle" class="form-label">Título</label>
                            <input type="text" class="form-control" id="eventTitle" placeholder="Ej: Siembra de maíz">
                        </div>
                        <div class="mb-3">
                            <label for="eventType" class="form-label">Tipo</label>
                            <select class="form-select" id="eventType">
                                <option value="">Cargando tipos...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="eventCropId" class="form-label">Cultivo relacionado</label>
                            <select class="form-select" id="eventCropId">
                                <option value="">General</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="eventDate" class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="eventDate">
                        </div>
                        <div class="mb-3">
                            <label for="eventDescription" class="form-label">Descripción</label>
                            <textarea class="form-control" id="eventDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-forest-green" id="saveEventBtn">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.min.js"></script>
    <script src="js/milpa-api.js"></script>
    <script src="js/milpa-shell.js"></script>
    <script src="js/calendario.js"></script>
</body>
</html>
