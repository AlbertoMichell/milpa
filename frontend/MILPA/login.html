<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema MILPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        :root {
            --forest-green: #2E7D32;
            --forest-dark: #1B5E20;
        }

        .login-section {
            background: linear-gradient(rgba(46, 125, 50, 0.9), rgba(46, 125, 50, 0.9)), 
                        url('images/milpa-field.jpg') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .login-header {
            background: var(--forest-green);
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }

        .login-header i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .login-body {
            padding: 2.5rem;
            background: #f8f9fa;
        }

        .form-control {
            height: 50px;
            border-radius: 8px;
            padding-left: 20px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--forest-green);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.25);
        }

        .btn-login {
            background: var(--forest-green);
            color: white;
            height: 50px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: var(--forest-dark);
            transform: scale(1.02);
        }

        .input-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }

        .alert-custom { /* Este estilo parece no usarse directamente, showAlert crea su propio HTML */
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 300px;
            z-index: 9999;
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <section class="login-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-5">
                    <div class="login-card slide-in-bottom"> 
                        <div class="login-header">
                            <i class="fas fa-seedling"></i>
                            <h1 class="mb-0">Sistema MILPA</h1>
                            <p class="mb-0 mt-2">Agricultura Inteligente</p>
                        </div>
                        
                        <div class="login-body">
                            <form id="loginForm" class="needs-validation" novalidate>
                                <div id="alertContainer"></div>

                                <div class="mb-4">
                                    <label class="form-label">Usuario</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0">
                                            <i class="fas fa-user"></i>
                                        </span>
                                        <input type="text" 
                                               class="form-control" 
                                               id="username"
                                               placeholder="Nombre de usuario"
                                               required
                                               pattern=".{3,}">
                                        <div class="invalid-feedback">
                                            Ingrese un usuario válido (mínimo 3 caracteres)
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">Contraseña</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0">
                                            <i class="fas fa-lock"></i>
                                        </span>
                                        <input type="password" 
                                               class="form-control" 
                                               id="password"
                                               placeholder="••••••••"
                                               required
                                               minlength="6">
                                        <div class="invalid-feedback">
                                            La contraseña debe tener al menos 6 caracteres
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between mb-4">
                                    <div class="form-check">
                                        <input type="checkbox" 
                                               class="form-check-input" 
                                               id="remember">
                                        <label class="form-check-label" for="remember">
                                            Recordar sesión
                                        </label>
                                    </div>
                                    <a href="#" class="text-decoration-none text-forest-green">
                                        ¿Olvidaste tu contraseña?
                                    </a>
                                </div>

                                <button type="submit" 
                                        class="btn btn-login w-100 mb-3" 
                                        id="loginBtn">
                                    <span id="loginText">Iniciar Sesión</span>
                                    <div id="loginSpinner" 
                                         class="spinner-border spinner-border-sm text-light d-none" 
                                         role="status">
                                        <span class="visually-hidden">Cargando...</span>
                                    </div>
                                </button>

                                <div class="text-center pt-3">
                                    <p class="mb-0">¿Nuevo en MILPA? 
                                        <a href="registro.html" 
                                           class="text-forest-green fw-bold text-decoration-none">
                                            Crear cuenta
                                        </a>
                                    </p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('loginForm'); // Se mantiene 'form' como en tu script original
  const loginBtn = document.getElementById('loginBtn');
  const loginText = document.getElementById('loginText');
  const spinner = document.getElementById('loginSpinner'); // Se mantiene 'spinner' como en tu script original

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    e.stopPropagation();

    // Limpiar alertas previas y quitar clases de validación para un nuevo intento
    const alertContainer = document.getElementById('alertContainer');
    if(alertContainer) alertContainer.innerHTML = '';
    form.classList.remove('was-validated');


    if (!form.checkValidity()) {
      form.classList.add('was-validated');
      return;
    }

    loginBtn.disabled = true;
    loginText.classList.add('d-none');
    spinner.classList.remove('d-none');

    try {
      const credentials = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      };


      const response = await fetch('http://localhost:4000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(credentials)
      });

      // Se parsea la respuesta JSON independientemente del status.ok para poder leer mensajes de error del backend.
      const responseData = await response.json();

      if (!response.ok) {
        // Si la respuesta no es ok, se lanza un error con el mensaje del backend o uno genérico.
        throw new Error(responseData.error || responseData.message || `Error de autenticación (${response.status})`);
      }

      // Si la respuesta es OK (login exitoso):
      // El backend ahora devuelve: { message, token, userId, username }
      
      // --- INICIO DE ACTUALIZACIÓN IMPORTANTE ---
      localStorage.setItem('milpaToken', responseData.token); // Guardar el JWT
      localStorage.setItem('milpaUser', JSON.stringify({   // Guardar datos básicos del usuario
        userId: responseData.userId,
        username: responseData.username
      }));
      // --- FIN DE ACTUALIZACIÓN IMPORTANTE ---
      
      // Opcional: Mostrar mensaje de éxito antes de redirigir
      if(alertContainer) showAlert('¡Bienvenido!'); // Usa la función showAlert existente

      setTimeout(() => {
          window.location.href = 'dashboard.html'; // Ir al dashboard
      }, 1500); // Pequeña demora para que el usuario vea el mensaje de éxito


    } catch (err) {
      // La función showAlert ya está definida en tu script original
      if(alertContainer) showAlert(err.message, 'danger'); 
      // Solo reactivar el botón si hubo un error y no se redirige
      loginBtn.disabled = false; 
    } finally {
      
      if (!localStorage.getItem('milpaToken')) { // Si el login falló, el botón debe estar activo
          loginText.classList.remove('d-none');
          spinner.classList.add('d-none');
      } else {
      }
    }
  });

  // Tu función showAlert original
  function showAlert(message, type = 'danger') {
    const alertContainer = document.getElementById('alertContainer');
    // Se añade un ícono según el tipo de alerta para mejor feedback visual
    const iconClass = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    alertContainer.innerHTML = `
      <div class="alert alert-${type} alert-dismissible fade show" role="alert">
        <i class="fas ${iconClass} me-2"></i>
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    `;
  }
});
</script>

</body>
</html>
