# yoyo.ini
# Configuración de yoyo-migrations para MILPA AI backend
# Ejecutar con: yoyo apply --database sqlite:///data/milpa_knowledge.db

[DEFAULT]
sources = core/logic/migrations
database = sqlite:///data/milpa_knowledge.db
batch_mode = off
verbosity = 1

# Configuración para producción
# [production]
# database = postgresql://user:password@host:5432/milpa_db
# batch_mode = on
